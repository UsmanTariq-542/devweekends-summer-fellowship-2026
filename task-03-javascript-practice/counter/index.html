<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Counter</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; }
        #count { font-size: 80px; font-weight: bold; }
        button { font-size: 24px; margin: 10px; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Counter</h1>
    <div id="count">0</div>
    <button onclick="decrement()">-</button>
    <button onclick="reset()">Reset</button>
    <button onclick="increment()">+</button>

    <script src="script.js"></script>
</body>
</html>
